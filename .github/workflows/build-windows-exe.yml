name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows-exe:
    name: Build Windows executable
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,build]"

      - name: Run tests
        run: pytest -q

      - name: Build executable
        shell: pwsh
        run: ./tools/build_exe.ps1 -SkipInstall

      - name: Package executable folder
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/HF Repo Downloader/*" -DestinationPath "dist/HF-Repo-Downloader-Windows.zip" -Force

      - name: Upload executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: HF-Repo-Downloader-Windows
          path: dist/HF-Repo-Downloader-Windows.zip
          if-no-files-found: error
